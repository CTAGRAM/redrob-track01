# ============================================================================
# AI tools declaration (honest)
# ============================================================================
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude for architecture discussion, code authoring, and review. The
  ranking system itself is a deterministic, rule-based + lexical-semantic scorer
  written in pure Python — no machine-learned model and no LLM is invoked during
  ranking. No candidate data was sent to any hosted LLM at any point.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic JD-grounded ranker that reads what candidates actually built
  (career-history free text) rather than counting AI keywords in their skills
  list — skills are assigned near-uniformly at random in this dataset, which is
  the keyword trap the JD warns about. A transparent rubric scores role match,
  evidence of shipped ranking/search/recommendation systems, vector-search and
  evaluation experience, NLP/IR domain, the 5-9-year band, and product-vs-services
  career, then subtracts penalties (services-only career, CV/speech-without-NLP,
  job-hopping, framework-only). Bounded location and availability modifiers
  down-weight unavailable candidates without burying strong-but-quiet ones (we
  deliberately avoid the sample submission's over-weighting of response rate). A
  consistency gate removes internally-impossible "honeypot" profiles so they can
  never reach the shortlist. Runs over 100K candidates in ~18 seconds on CPU with
  zero third-party dependencies, so reproduction is trivial and fully auditable.

